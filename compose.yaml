services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      DATABASE_PATH: /app/data/unianon.sqlite
      REDIS_URL: redis://redis:6379
      SERVER_SECRET: ${SERVER_SECRET:-dev-only-change-me}
      AUTH_SUBJECT_SECRET: ${AUTH_SUBJECT_SECRET:-dev-only-change-me}
      MEMBERSHIP_ASSERTION_SECRET: ${MEMBERSHIP_ASSERTION_SECRET:-dev-only-change-me}
      MEMBERSHIP_ASSERTION_TTL_MS: ${MEMBERSHIP_ASSERTION_TTL_MS:-300000}
      SESSION_TTL_MS: ${SESSION_TTL_MS:-604800000}
      ALLOWED_DOMAINS: ${ALLOWED_DOMAINS:-example.edu,example.org,company.com}
      MAGIC_TOKEN_TTL_MS: ${MAGIC_TOKEN_TTL_MS:-900000}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:${PORT:-3000}}
      EMAIL_DELIVERY: ${EMAIL_DELIVERY:-dev}
      EMAIL_FROM: ${EMAIL_FROM:-UniAnon <no-reply@localhost>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      REPORT_WEIGHT_THRESHOLD: ${REPORT_WEIGHT_THRESHOLD:-3}
      JURY_APPROVAL_WEIGHT: ${JURY_APPROVAL_WEIGHT:-3}
      ADMIN_PROTECTION_APPROVAL_WEIGHT: ${ADMIN_PROTECTION_APPROVAL_WEIGHT:-8}
    volumes:
      - unianon-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  unianon-data:
