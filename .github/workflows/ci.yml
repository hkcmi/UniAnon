name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run production smoke test
        run: npm run smoke:production

      - name: Run production readiness dry run
        run: |
          mkdir -p /tmp/unianon-ci
          DATABASE_PATH=/tmp/unianon-ci/readiness.sqlite node --input-type=module -e "import { createStore } from './src/store.js'; const store = createStore(); store.close();"
          NODE_ENV=production \
          DATABASE_PATH=/tmp/unianon-ci/readiness.sqlite \
          SERVER_SECRET=server-ci-readiness-secret-123456789012 \
          AUTH_SUBJECT_SECRET=subject-ci-readiness-secret-12345678901 \
          AUTH_LOG_SECRET=auth-log-ci-readiness-secret-123456789 \
          NULLIFIER_SECRET=nullifier-ci-readiness-secret-123456789 \
          MEMBERSHIP_ASSERTION_SECRET=assertion-ci-readiness-secret-123456789 \
          ALLOWED_DOMAINS=example.edu \
          APP_BASE_URL=https://unianon-ci.example.edu \
          EMAIL_DELIVERY=smtp \
          EMAIL_FROM="UniAnon <no-reply@unianon-ci.example.edu>" \
          SMTP_HOST=smtp.invalid \
          REDIS_URL=redis://localhost:6379 \
          npm run readiness:production

      - name: Run system admin bootstrap dry run
        run: |
          mkdir -p /tmp/unianon-ci
          DATABASE_PATH=/tmp/unianon-ci/bootstrap.sqlite node --input-type=module -e "import { createStore } from './src/store.js'; const store = createStore(); const user = store.upsertUser('ci-bootstrap-user', 'example.edu', 'ci-bootstrap-nullifier'); store.setNickname(user.user_hash, 'ci_bootstrap_admin'); store.close();"
          DATABASE_PATH=/tmp/unianon-ci/bootstrap.sqlite npm run admin:bootstrap -- --nickname ci_bootstrap_admin
          DATABASE_PATH=/tmp/unianon-ci/bootstrap.sqlite node --input-type=module -e "import { createStore } from './src/store.js'; const store = createStore(); const user = store.users.get('ci-bootstrap-user'); if (!user.roles.includes('system_admin')) process.exit(1); store.close();"

      - name: Write CI smoke summary
        run: |
          {
            echo "## UniAnon CI Smoke Summary"
            echo ""
            echo "| Check | Status | Privacy note |"
            echo "| --- | --- | --- |"
            echo "| Test suite | Passed | Runs with NODE_ENV=test and local data only. |"
            echo "| Production smoke | Passed | Uses smtp.invalid and does not send real email. |"
            echo "| Production readiness dry run | Passed | Uses a temporary SQLite database and fake production secrets. |"
            echo "| System admin bootstrap dry run | Passed | Uses a temporary fixture user and database. |"
          } >> "$GITHUB_STEP_SUMMARY"
